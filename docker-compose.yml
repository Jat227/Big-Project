
services:
  # ── PostgreSQL Database ────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: pricefinder_postgres
    restart: always
    environment:
      POSTGRES_USER: pricefinder
      POSTGRES_PASSWORD: pricefinder
      POSTGRES_DB: pricefinder
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pricefinder"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis Cache + Message Broker ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: pricefinder_redis
    restart: always
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── FastAPI Web Server ─────────────────────────────────────────────────────
  web:
    build: .
    container_name: pricefinder_web
    restart: always
    ports:
      - "5001:5001"
    environment:
      DATABASE_URL: postgresql+asyncpg://pricefinder:pricefinder@postgres:5432/pricefinder
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app   # for hot-reload in dev; remove in prod

  # ── Celery Background Worker ───────────────────────────────────────────────
  celery_worker:
    build: .
    container_name: pricefinder_celery
    restart: always
    command: celery -A celery_app worker --loglevel=info --concurrency=4
    environment:
      DATABASE_URL: postgresql+asyncpg://pricefinder:pricefinder@postgres:5432/pricefinder
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - .:/app

  # ── Flower — Celery Task Dashboard ────────────────────────────────────────
  flower:
    build: .
    container_name: pricefinder_flower
    restart: always
    command: celery -A celery_app flower --port=5555
    ports:
      - "5555:5555"
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
      - celery_worker

volumes:
  postgres_data:
