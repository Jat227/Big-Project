<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PriceFinder - Compare &amp; Save on Amazon &amp; Flipkart</title>
    <meta name="description" content="Compare prices across Amazon and Flipkart to find the lowest price on any product in India. Brand-new, first-hand products only.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="app">
        <!-- ===== HEADER (sticky, Amazon/Flipkart style) ===== -->
        <header class="hero">
            <div class="header-nav">
                <!-- Logo -->
                <div class="logo">
                    <i class="fa-solid fa-tags"></i> PriceFinder
                </div>

                <!-- Search bar (visible in header) -->
                <div class="header-search" id="headerSearch">
                    <input type="text" id="searchInput" placeholder="Search for products, brands and more…" autocomplete="off">
                    <button id="searchBtn"><i class="fa-solid fa-magnifying-glass"></i> <span>Search</span></button>
                </div>
            </div>

            <!-- Category nav -->
            <nav class="top-categories">
                <ul id="categoryList" class="cat-list-horizontal">
                    <!-- Populated by JS -->
                </ul>
            </nav>
        </header>

        <!-- ===== HERO LANDING (shown before first search) ===== -->
        <section id="heroLanding" class="hero-landing">
            <h1 class="hero-title">Find the <span>Lowest Price</span> Instantly</h1>
            <p class="hero-subtitle">Compare across Amazon &amp; Flipkart &mdash; brand-new, first-hand products only.</p>
        </section>

        <!-- ===== MAIN LAYOUT (sidebar + content, shown after search) ===== -->
        <div id="mainLayout" class="layout-container hidden">

            <!-- Sidebar overlay (mobile backdrop) -->
            <div class="sidebar-overlay" id="sidebarOverlay"></div>

            <!-- Sidebar -->
            <aside id="sidebar" class="sidebar">
                <div id="filterBlock" class="sidebar-block">
                    <h3>Filter Results</h3>
                    <div id="filtersContainer">
                        <!-- dynamic filters -->
                    </div>
                </div>
            </aside>

            <!-- Main Content -->
            <div class="content-wrapper">
                <!-- Mobile filter toggle -->
                <button class="filter-toggle-btn" id="filterToggleBtn">
                    <i class="fa-solid fa-sliders"></i> Filters
                </button>

                <!-- Loading State -->
                <div id="loadingState" class="hidden">
                    <div class="loader"></div>
                    <p>Scanning platforms for the best deals…</p>
                </div>

                <!-- Results Section -->
                <main id="resultsContainer" class="hidden">
                    <div class="results-header">
                        <h2>Showing results for <span id="queryText" class="highlight">"iPhone"</span></h2>
                    </div>
                    <div id="productGrid" class="product-grid">
                        <!-- Product Cards injected by JS -->
                    </div>
                </main>
            </div>
        </div>
    </div>

    <!-- Custom JS -->
    <script src="/static/app.js?v=6"></script>
</body>
</html>
